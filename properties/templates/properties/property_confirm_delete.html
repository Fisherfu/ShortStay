{% extends 'properties/base.html' %}

{% block title %}刪除房源 - Short Stay{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row">
        <div class="col-lg-6 mx-auto">
            <div class="card border-danger">
                <div class="card-header bg-danger text-white">
                    <h5 class="mb-0">
                        <i class="bi bi-exclamation-triangle"></i> 確認刪除
                    </h5>
                </div>
                <div class="card-body">
                    <h5 class="card-title">{{ property.title }}</h5>
                    <p class="card-text text-muted">
                        <i class="bi bi-geo-alt"></i> {{ property.city }} {{ property.district }}
                    </p>

                    <div class="alert alert-danger">
                        <strong>警告：</strong>此操作無法撤銷！
                        <ul class="mb-0 mt-2">
                            <li>房源的所有資訊和圖片將被永久刪除</li>
                            <li>相關的預訂記錄也將被刪除</li>
                        </ul>
                    </div>

                    <p>確定要刪除這個房源嗎？</p>

                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-danger">
                                <i class="bi bi-trash"></i> 確認刪除
                            </button>
                            <a href="{% url 'landlord_properties' %}" class="btn btn-secondary">
                                <i class="bi bi-x-circle"></i> 取消
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
