{% extends 'properties/base.html' %}

{% block title %}刪除需求 - Short Stay{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row">
        <div class="col-md-6 mx-auto">
            <div class="card shadow">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0"><i class="bi bi-exclamation-triangle"></i> 確認刪除</h4>
                </div>
                <div class="card-body">
                    <p class="mb-4">您確定要刪除以下找房需求嗎？此操作無法復原。</p>

                    <div class="alert alert-light">
                        <h5>{{ request_obj.title }}</h5>
                        <p class="mb-0 text-muted small">{{ request_obj.description|truncatewords:30 }}</p>
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'my_rental_requests' %}" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left"></i> 取消
                            </a>
                            <button type="submit" class="btn btn-danger">
                                <i class="bi bi-trash"></i> 確認刪除
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
