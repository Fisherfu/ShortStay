{% extends 'properties/base.html' %}

{% block title %}上傳圖片 - Short Stay{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row">
        <div class="col-lg-6 mx-auto">
            <h2 class="mb-4">
                <i class="bi bi-image"></i> 上傳圖片
            </h2>

            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">{{ property.title }}</h5>

                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">{{ form.image.label }}</label>
                            {{ form.image }}
                            {% if form.image.errors %}
                            <div class="text-danger">{{ form.image.errors }}</div>
                            {% endif %}
                        </div>

                        <div class="mb-3 form-check">
                            {{ form.is_cover }}
                            <label class="form-check-label">
                                {{ form.is_cover.label }}
                            </label>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">{{ form.order.label }}</label>
                            {{ form.order }}
                            <small class="form-text text-muted">數字越小排序越前</small>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-upload"></i> 上傳
                            </button>
                            <a href="{% url 'property_edit' property.pk %}" class="btn btn-secondary">
                                <i class="bi bi-x-circle"></i> 取消
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
