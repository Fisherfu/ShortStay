server {
    listen 80;
    server_name your-ec2-public-ip your-domain.com;  # 替换为实际IP/域名

    client_max_body_size 20M;

    # 静态文件
    location /static/ {
        alias /var/www/short_stay/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 媒体文件
    location /media/ {
        alias /var/www/short_stay/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Django应用
    location / {
        include proxy_params;
        proxy_pass http://unix:/var/www/short_stay/short_stay.sock;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # 访问日志
    access_log /var/log/nginx/short_stay_access.log;
    error_log /var/log/nginx/short_stay_error.log;
}
